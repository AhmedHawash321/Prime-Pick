services:
  redis:
    image: redis:alpine
    container_name: product-store-redis
    ports:
      - "6370:6379"
    networks:
      - product-network
    restart: always

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: product-store-backend:latest
    container_name: product-store-backend
    ports:
      - "5001:5000"
    depends_on:
      - redis
    env_file:
      - .env
    environment:
      - TZ=Africa/Cairo
    volumes:
      - .:/app
      - /app/node_modules
    dns:
      - 8.8.8.8
      - 1.1.1.1
    networks:
      - product-network
    command: npm run dev
    restart: always

networks:
  product-network:
    driver: bridge